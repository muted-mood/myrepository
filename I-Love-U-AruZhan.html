<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>I Love You 💖</title>
<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
  background: linear-gradient(160deg, #ffdde1 0%, #ffe9ec 40%, #ffd6e8 100%);
}

/* ---------- МУЗЫКАЛЬНЫЙ ПЛЕЕР (скрытый) ---------- */
#yt-player-box {
  position: fixed;
  width: 1px;
  height: 1px;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
  top: -9999px;
  left: -9999px;
}

.music-toggle {
  position: fixed;
  top: 18px;
  right: 18px;
  z-index: 100;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  border: 2px solid #ffb3c1;
  background: rgba(255, 255, 255, 0.9);
  font-size: 20px;
  cursor: pointer;
  box-shadow: 0 6px 16px rgba(255, 105, 150, 0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease;
}

.music-toggle:active {
  transform: scale(0.9);
}

/* ---------- FLOATING HEARTS BACKGROUND ---------- */
#hearts-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  overflow: hidden;
  z-index: 0;
  pointer-events: none;
}

.floating-heart {
  position: absolute;
  bottom: -10%;
  font-size: 22px;
  opacity: 0.75;
  animation-name: floatUp;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
  filter: drop-shadow(0 0 3px rgba(255,105,135,0.4));
}

@keyframes floatUp {
  0% {
    transform: translateY(0) translateX(0) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 0.8;
  }
  50% {
    transform: translateY(-55vh) translateX(15px) rotate(20deg);
  }
  100% {
    transform: translateY(-110vh) translateX(-15px) rotate(-15deg);
    opacity: 0;
  }
}

/* ---------- LAYOUT ---------- */
.wrapper {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100vh;
  overflow-y: auto;
  overflow-x: hidden;
}

.page {
  display: none;
  position: relative;
  width: 100%;
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

.page.active {
  display: flex;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.card {
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(6px);
  border-radius: 26px;
  padding: 32px 22px;
  max-width: 440px;
  width: 100%;
  text-align: center;
  box-shadow: 0 15px 35px rgba(255, 105, 150, 0.25);
  border: 2px solid rgba(255, 182, 200, 0.6);
  position: relative;
  min-height: 320px;
}

.title {
  font-size: 1.5rem;
  color: #d6336c;
  margin-bottom: 28px;
  line-height: 1.4;
  font-weight: 700;
}

.subtitle {
  color: #e64980;
  font-size: 1.1rem;
  margin: 14px 0;
}

.big-final {
  font-size: 1.7rem;
}

/* ---------- BUTTONS ---------- */
.btn {
  border: none;
  border-radius: 50px;
  padding: 15px 26px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  margin: 8px;
  min-width: 140px;
}

.btn:active {
  transform: scale(0.95);
}

.btn-yes {
  background: linear-gradient(135deg, #ff8fa3, #ff4d6d);
  color: white;
  box-shadow: 0 8px 20px rgba(255, 77, 109, 0.45);
}

.btn-yes:hover {
  box-shadow: 0 10px 25px rgba(255, 77, 109, 0.6);
}

.btn-no {
  background: #ffffff;
  color: #d6336c;
  border: 2px solid #ffb3c1;
  position: relative;
}

.btn-choice {
  background: linear-gradient(135deg, #fff0f3, #ffe0e8);
  color: #d6336c;
  border: 2px solid #ffb3c1;
}

.btn-choice:active,
.btn-choice.selected {
  background: linear-gradient(135deg, #ff8fa3, #ff4d6d);
  color: white;
}

.btn-area {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 6px;
  position: relative;
  min-height: 120px;
}

.btn-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* buttons that run away become fixed-position so they can roam the screen */
.escaping {
  position: fixed !important;
  z-index: 50;
  transition: top 0.25s ease, left 0.25s ease;
}

/* ---------- SLIDER ---------- */
.slider-wrap {
  margin: 20px 0 30px 0;
}

.slider-track {
  position: relative;
  width: 100%;
  height: 14px;
  background: #ffe0e8;
  border-radius: 20px;
  margin-bottom: 10px;
  overflow: visible;
}

.slider-fill {
  position: absolute;
  left: 0; top: 0;
  height: 100%;
  width: 50%;
  background: linear-gradient(90deg, #ff8fa3, #ff4d6d);
  border-radius: 20px;
  transition: width 0.1s ease;
}

.slider-heart {
  position: absolute;
  top: -14px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 26px;
  transition: left 0.1s ease;
  pointer-events: none;
  filter: drop-shadow(0 2px 4px rgba(255,77,109,0.5));
}

.slider-input {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 14px;
  background: transparent;
  position: relative;
  top: -24px;
  margin: 0;
}

.slider-input::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: transparent;
  cursor: pointer;
}

.slider-input::-moz-range-thumb {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: transparent;
  border: none;
  cursor: pointer;
}

.percent-label {
  color: #d6336c;
  font-weight: 700;
  font-size: 1.2rem;
  margin-top: -8px;
}

/* ---------- PHOTO COLLAGE (COVER) ---------- */
.photo-collage {
  position: relative;
  width: 100%;
  height: 190px;
  margin-bottom: 22px;
}

.polaroid {
  position: absolute;
  width: 90px;
  padding: 5px 5px 14px 5px;
  background: #fff;
  border-radius: 6px;
  box-shadow: 0 8px 18px rgba(214, 51, 108, 0.35);
  transition: transform 0.25s ease;
}

.polaroid img {
  display: block;
  width: 100%;
  height: 98px;
  object-fit: cover;
  border-radius: 3px;
}

.polaroid:nth-child(1) { left: 0%;  top: 6px;  transform: rotate(-11deg); z-index: 1; }
.polaroid:nth-child(2) { left: 23%; top: 26px; transform: rotate(7deg);   z-index: 2; }
.polaroid:nth-child(3) { left: 46%; top: 0px;  transform: rotate(-6deg);  z-index: 3; }
.polaroid:nth-child(4) { left: 67%; top: 24px; transform: rotate(10deg);  z-index: 2; }

@media (min-width: 900px) {
  .photo-collage { height: 240px; }
  .polaroid { width: 140px; padding: 8px 8px 20px 8px; }
  .polaroid img { height: 150px; }
}

/* ---------- DATE PICKER ---------- */
.date-wrap {
  margin: 20px 0 28px 0;
  text-align: left;
}

.date-label {
  display: block;
  color: #d6336c;
  font-weight: 600;
  margin-bottom: 8px;
  font-size: 1rem;
}

.date-input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 16px;
  border: 2px solid #ffb3c1;
  background: #fff5f7;
  color: #a8305e;
  font-size: 1rem;
  font-family: inherit;
  font-weight: 600;
}

.date-input:focus {
  outline: none;
  border-color: #ff4d6d;
}

/* ---------- RESULTS ---------- */
.results-box {
  text-align: left;
  background: #fff5f7;
  border-radius: 16px;
  padding: 16px 18px;
  margin: 16px 0 24px 0;
  border: 2px dashed #ffb3c1;
  color: #a8305e;
  font-size: 0.95rem;
  line-height: 1.8;
}

/* ---------- SMALL PHONES ---------- */
@media (max-width: 360px) {
  .title { font-size: 1.3rem; }
  .btn { padding: 12px 18px; font-size: 0.9rem; min-width: 120px; }
}

/* ---------- БОЛЬШИЕ ЭКРАНЫ / ПК / FULL HD ---------- */
@media (min-width: 900px) {
  .card {
    max-width: 620px;
    padding: 48px 44px;
    border-radius: 34px;
    min-height: 400px;
  }

  .title {
    font-size: 2rem;
    margin-bottom: 36px;
  }

  .subtitle {
    font-size: 1.4rem;
  }

  .big-final {
    font-size: 2.3rem;
  }

  .btn {
    font-size: 1.15rem;
    padding: 18px 32px;
    min-width: 170px;
  }

  .results-box {
    font-size: 1.1rem;
  }

  .floating-heart {
    font-size: 28px !important;
  }
}


</style>

function createFloatingHearts() {
  const container = document.getElementById("hearts-bg");
  const heartsEmoji = ["💖", "💕", "💗", "❤️", "💓", "💘"];
  // на больших экранах сердечек больше, чтобы фон не выглядел пустым
  const count = Math.min(60, Math.max(22, Math.floor(window.innerWidth / 28)));

  for (let i = 0; i < count; i++) {
    const heart = document.createElement("div");
    heart.className = "floating-heart";
    heart.textContent = heartsEmoji[Math.floor(Math.random() * heartsEmoji.length)];
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = 14 + Math.random() * 20 + "px";
    const duration = 8 + Math.random() * 10;
    heart.style.animationDuration = duration + "s";
    heart.style.animationDelay = (Math.random() * duration) + "s";
    container.appendChild(heart);
  }
}

    events: {
      onReady: (e) => {
        e.target.mute();
        e.target.playVideo();
      }
    }
  });
}

function unlockMusic() {
  if (!ytPlayer || musicUnlocked) return;
  musicUnlocked = true;
  ytPlayer.unMute();
  ytPlayer.setVolume(60);
  ytPlayer.playVideo();
  if (musicToggleBtn) musicToggleBtn.textContent = "🔊";
}

function toggleMusic() {
  if (!ytPlayer) return;

  if (!musicUnlocked) {
    unlockMusic();
    return;
  }

  const state = ytPlayer.getPlayerState();
  if (state === YT.PlayerState.PLAYING) {
    ytPlayer.pauseVideo();
    musicToggleBtn.textContent = "🔇";
  } else {
    ytPlayer.playVideo();
    musicToggleBtn.textContent = "🔊";
  }
}

if (musicToggleBtn) {
  musicToggleBtn.addEventListener("click", toggleMusic);
}

// первый любой тап по странице тоже включает звук (обход блокировки автоплея)
document.addEventListener("click", unlockMusic, { once: true });
document.addEventListener("touchstart", unlockMusic, { once: true });


function goToPage(num) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page" + num).classList.add("active");
  window.scrollTo(0, 0);
}

/* ============================================================
   УНИВЕРСАЛЬНАЯ ФУНКЦИЯ "УБЕГАЮЩЕЙ" КНОПКИ
   button   - DOM элемент кнопки
   phrases  - массив милых текстов, которые будут появляться по очереди

   Кнопка прыгает СТРОГО по видимым сторонам экрана (углы и края),
   никогда не выходит за границы viewport, и двигается ТОЛЬКО
   по клику/тапу — не от наведения курсора.
   ============================================================ */
function makeButtonEscape(button, phrases) {
  let clickCount = 0;
  let lastPositionIndex = -1;
  let lastInteractionTime = 0;

  function getViewportSize() {
    // visualViewport точнее отражает реально видимую область
    // (учитывает зум браузера, масштаб экрана, клавиатуру на телефоне и т.д.)
    if (window.visualViewport) {
      return {
        width: window.visualViewport.width,
        height: window.visualViewport.height
      };
    }
    return {
      width: document.documentElement.clientWidth || window.innerWidth,
      height: document.documentElement.clientHeight || window.innerHeight
    };
  }

  function getPositions() {
    const margin = 14;
    const btnWidth = button.offsetWidth;
    const btnHeight = button.offsetHeight;
    const viewport = getViewportSize();

    const minLeft = margin;
    const maxLeft = Math.max(margin, viewport.width - btnWidth - margin);
    const minTop = margin;
    const maxTop = Math.max(margin, viewport.height - btnHeight - margin);
    const centerLeft = Math.max(minLeft, (viewport.width - btnWidth) / 2);
    const centerTop = Math.max(minTop, (viewport.height - btnHeight) / 2);

    // восемь разных "сторон" экрана
    return [
      { left: minLeft, top: minTop },
      { left: maxLeft, top: minTop },
      { left: minLeft, top: maxTop },
      { left: maxLeft, top: maxTop },
      { left: centerLeft, top: minTop },
      { left: centerLeft, top: maxTop },
      { left: minLeft, top: centerTop },
      { left: maxLeft, top: centerTop }
    ];
  }

  function moveButton() {
    if (!button.classList.contains("escaping")) {
      const rect = button.getBoundingClientRect();
      button.style.left = rect.left + "px";
      button.style.top = rect.top + "px";
      button.classList.add("escaping");
    }

    const positions = getPositions();
    let index;
    do {
      index = Math.floor(Math.random() * positions.length);
    } while (index === lastPositionIndex && positions.length > 1);
    lastPositionIndex = index;

    const target = positions[index];

    requestAnimationFrame(() => {
      button.style.left = target.left + "px";
      button.style.top = target.top + "px";
    });
  }

  function handleInteraction(e) {
    e.preventDefault();

    // защита от двойного срабатывания click + touchstart на одном тапе
    const now = Date.now();
    if (now - lastInteractionTime < 350) return;
    lastInteractionTime = now;

    moveButton();
    const phrase = phrases[Math.min(clickCount, phrases.length - 1)];
    button.textContent = phrase;
    clickCount++;
  }

  // реагируем только на реальное нажатие/тап, не на наведение курсора
  button.addEventListener("click", handleInteraction);
  button.addEventListener("touchstart", handleInteraction, { passive: false });

  // если экран повернули или изменили размер/зум — держим кнопку в границах
  function clampToViewport() {
    if (button.classList.contains("escaping")) {
      const rect = button.getBoundingClientRect();
      const margin = 14;
      const viewport = getViewportSize();
      const maxLeft = Math.max(margin, viewport.width - rect.width - margin);
      const maxTop = Math.max(margin, viewport.height - rect.height - margin);
      button.style.left = Math.min(Math.max(rect.left, margin), maxLeft) + "px";
      button.style.top = Math.min(Math.max(rect.top, margin), maxTop) + "px";
    }
  }

  window.addEventListener("resize", clampToViewport);
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", clampToViewport);
  }
}

/* ============================================================
   PAGE 1 — кнопка "НЕТ"
   ============================================================ */
const noBtn1 = document.getElementById("noBtn1");
makeButtonEscape(noBtn1, [
  "Ұстай алмайсың 😜",
  "Бос әрекет 😝",
  "Тіпті ойлама да 🙈",
  "Мен сенен жылдаммын 💨",
  "Бәрібір ИӘ дейсің 😘"
]);

/* ============================================================
   PAGE 2 — выбор еды (нужно выбрать ровно 2 варианта из 4)
   ============================================================ */
function chooseFood(el) {
  const value = el.getAttribute("data-value");
  const isSelected = el.classList.contains("selected");

  if (isSelected) {
    // снимаем выбор
    el.classList.remove("selected");
    answers.food = answers.food.filter(v => v !== value);
    return;
  }

  if (answers.food.length >= 2) {
    // уже выбрано 2 — больше нельзя, пока не снимешь одно из них
    return;
  }

  el.classList.add("selected");
  answers.food.push(value);

  if (answers.food.length === 2) {
    setTimeout(() => goToPage(3), 450);
  }
}

/* ============================================================
   PAGE 3 — способ передвижения
   ============================================================ */
const carBtn = document.getElementById("carBtn");
const walkBtn = document.getElementById("walkBtn");

makeButtonEscape(carBtn, [
  "Бүгін жоқ 😅",
  "Таксимен ыңғайлырақ 💕",
  "Тіпті үміттенбе 😝",
  "Ұстай алмайсың 😜"
]);

makeButtonEscape(walkBtn, [
  "Бұл жолы жоқ 🙊",
  "Таксимен барған дұрыс 😏",
  "Аяғым талады 🥲",
  "Ұстай алмайсың 😜"
]);

function chooseTransport(value) {
  answers.transport = value;
  goToPage(4);
}

/* ============================================================
   PAGE 4 — кто платит
   ============================================================ */
const payMeBtn = document.getElementById("payMeBtn");
makeButtonEscape(payMeBtn, [
  "Сенімдісің бе? 🤨",
  "Тағы бір ойлан 😌",
  "Бұл жолы жоқ, сәулем 😘",
  "Нақты ол төлейді 😏"
]);

function choosePayer(value) {
  answers.payer = value;
  goToPage(5);
}

/* ============================================================
   PAGE 5 — дата и время встречи
   ============================================================ */
function chooseDate() {
  const dateVal = document.getElementById("dateInput").value;
  const timeVal = document.getElementById("timeInput").value;

  if (dateVal) {
    const [year, month, day] = dateVal.split("-");
    answers.date = day + "." + month + "." + year + (timeVal ? " " + timeVal : "");
  } else {
    answers.date = null;
  }

  goToPage(6);
}

/* ============================================================
   PAGE 6 — слайдер ожидания
   ============================================================ */
const waitSlider = document.getElementById("waitSlider");
const sliderFill = document.getElementById("sliderFill");
const sliderHeart = document.getElementById("sliderHeart");
const percentValue = document.getElementById("percentValue");

function updateSlider() {
  const val = waitSlider.value;
  sliderFill.style.width = val + "%";
  sliderHeart.style.left = val + "%";
  percentValue.textContent = val;
  answers.waitPercent = val;
}

waitSlider.addEventListener("input", updateSlider);
updateSlider();

/* ============================================================
   PAGE 7 — подведение итогов
   ============================================================ */
function finishQuiz() {
  goToPage(7);
  renderResults();
  sendResultsToMe();
}

function renderResults() {
  const box = document.getElementById("resultsBox");
  box.innerHTML = `
    🍽️ Тағам: <b>${answers.food.length ? answers.food.join(", ") : "—"}</b><br>
    🚗 Қалай барамыз: <b>${answers.transport || "—"}</b><br>
    💳 Кім төлейді: <b>${answers.payer || "—"}</b><br>
    📅 Кездесу күні: <b>${answers.date || "—"}</b><br>
    💓 Кездесуді күту деңгейі: <b>${answers.waitPercent}%</b>
  `;
}

function sendResultsToMe() {
  // Формируем текст и открываем WhatsApp с готовым сообщением на твой номер.
  const text =
    "Таңдау қорытындысы 💖%0A" +
    "Тағам: " + (answers.food.length ? answers.food.join(", ") : "-") + "%0A" +
    "Көлік: " + (answers.transport || "-") + "%0A" +
    "Төлейді: " + (answers.payer || "-") + "%0A" +
    "Кездесу күні: " + (answers.date || "-") + "%0A" +
    "Кездесуді күту: " + answers.waitPercent + "%25";

  const link = "https://wa.me/" + MY_WHATSAPP_NUMBER + "?text=" + text;

  // Открываем в новой вкладке, чтобы не мешать основному сайту.
  // Если хочешь автоматическую отправку без клика девушки — раскомментируй строку ниже.
  // window.open(link, "_blank");
  console.log("Ссылка для отправки результатов:", link);
}

/* ============================================================
   ПЕРЕЗАПУСК КВИЗА
   ============================================================ */
function restartQuiz() {
  answers.food = [];
  answers.transport = null;
  answers.payer = null;
  answers.date = null;
  answers.waitPercent = 50;

  waitSlider.value = 50;
  updateSlider();

  const dateInput = document.getElementById("dateInput");
  const timeInput = document.getElementById("timeInput");
  if (dateInput) dateInput.value = "";
  if (timeInput) timeInput.value = "";

  // возвращаем убежавшие кнопки на исходное место
  [noBtn1, carBtn, walkBtn, payMeBtn].forEach(btn => {
    btn.classList.remove("escaping");
    btn.style.left = "";
    btn.style.top = "";
  });

  noBtn1.textContent = "ЖОҚ";
  carBtn.textContent = "Көлікпен алып кетесің 🚙";
  walkBtn.textContent = "Қол ұстасып жаяу барамыз 🥰";
  payMeBtn.textContent = "Иә, мен";

  document.querySelectorAll(".btn-choice").forEach(b => b.classList.remove("selected"));

  goToPage(1);
}
